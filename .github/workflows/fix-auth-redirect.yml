name: Fix Auth Redirect (one-off)

# One-off: corrects the hosted Supabase Auth Site URL (was the dev default
# http://localhost:3000) and appends the production rooms URL to the redirect
# allow-list. Surgical PATCH via the Management API — does NOT run
# `supabase config push`, so other dashboard auth settings are untouched.
# Safe to delete after a successful run.

on:
  workflow_dispatch:

jobs:
  fix-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Patch Site URL + redirect allow-list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          REF="ywsbmarhoyxercqatbfy"
          API="https://api.supabase.com/v1/projects/$REF/config/auth"
          SITE="https://rooms.castle.community"

          echo "Fetching current auth config..."
          CUR=$(curl -fsS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" "$API")
          echo "  current site_url       : $(echo "$CUR" | jq -r '.site_url')"
          echo "  current uri_allow_list : $(echo "$CUR" | jq -r '.uri_allow_list')"

          NEW_LIST=$(echo "$CUR" | jq -r --arg site "$SITE" '
            ((.uri_allow_list // "") | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0)))
            + [$site + "/**", $site]
            | unique | join(",")
          ')
          echo "  new uri_allow_list     : $NEW_LIST"

          BODY=$(jq -n --arg s "$SITE" --arg u "$NEW_LIST" '{site_url:$s, uri_allow_list:$u}')

          echo "Patching..."
          RESP=$(curl -fsS -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY" "$API")
          echo "  updated site_url       : $(echo "$RESP" | jq -r '.site_url')"
          echo "  updated uri_allow_list : $(echo "$RESP" | jq -r '.uri_allow_list')"
          echo "Done."
